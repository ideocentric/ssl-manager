{% extends "base.html" %}
{% block title %}Forgot Password — SSL Manager{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body p-4">
    <h4 class="card-title mb-1 text-center">
      <i class="bi bi-envelope-open me-2 text-primary"></i>Reset Password
    </h4>
    <p class="text-muted text-center small mb-4">
      Enter your account email address and we'll send you a reset link.
    </p>
    <form method="post" action="{{ url_for('reset.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="email">Email Address</label>
        <input id="email" name="email" type="email"
               class="form-control" autofocus required
               placeholder="you@example.com"
               value="{{ request.form.get('email', '') }}">
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-send me-1"></i>Send Reset Link
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Back to Sign In
      </a>
    </div>
  </div>
</div>
{% endblock %}
