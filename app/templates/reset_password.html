{% extends "base.html" %}
{% block title %}Set New Password — SSL Manager{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body p-4">
    <h4 class="card-title mb-1 text-center">
      <i class="bi bi-shield-lock me-2 text-primary"></i>Set New Password
    </h4>
    <p class="text-muted text-center small mb-4">
      Choose a new password for your account.
    </p>
    <form method="post" action="{{ url_for('reset.reset_password_submit', token=token) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="password">New Password</label>
        <input id="password" name="password" type="password"
               class="form-control" autofocus required minlength="8"
               placeholder="At least 8 characters">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password"
               class="form-control" required minlength="8"
               placeholder="Repeat your new password">
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-check-lg me-1"></i>Set New Password
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Back to Sign In
      </a>
    </div>
  </div>
</div>
{% endblock %}
